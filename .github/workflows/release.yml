name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Run test suite
        run: swift test

  release:
    needs: test
    runs-on: macos-14
    permissions:
      contents: write
    env:
      HOMEBREW_TAP_REPO: fil-technology/homebrew-tap
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Package source archive
        run: ./scripts/package_source_release.sh "${GITHUB_REF_NAME}"

      - name: Package release archive
        run: ./scripts/package_release.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .dist/*.tar.gz
            .dist/*.sha256

      - name: Publish public Homebrew source release
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          release_tag="ashex-${GITHUB_REF_NAME}"
          if gh release view "$release_tag" --repo "$HOMEBREW_TAP_REPO" >/dev/null 2>&1; then
            gh release upload "$release_tag" \
              ".dist/ashex-${GITHUB_REF_NAME}-source.tar.gz" \
              ".dist/ashex-${GITHUB_REF_NAME}-source.tar.gz.sha256" \
              --clobber \
              --repo "$HOMEBREW_TAP_REPO"
          else
            gh release create "$release_tag" \
              ".dist/ashex-${GITHUB_REF_NAME}-source.tar.gz" \
              ".dist/ashex-${GITHUB_REF_NAME}-source.tar.gz.sha256" \
              --repo "$HOMEBREW_TAP_REPO" \
              --title "Ashex ${GITHUB_REF_NAME} source" \
              --notes "Public source asset for the Ashex Homebrew formula."
          fi

      - name: Generate Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
      
          ./scripts/render_homebrew_formula.sh \
            --version "${GITHUB_REF_NAME}" \
            --binary-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/ashex-${VERSION_NO_V}-macos-${ARCH}.tar.gz" \
            --sha256 "$(cat ".dist/ashex-${VERSION_NO_V}-macos-${ARCH}.tar.gz.sha256")" \
            --arch "${ARCH}" \
            --homepage "https://github.com/${GITHUB_REPOSITORY}" \
            --output ".dist/ashex.rb"

      - name: Publish Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          api_path="repos/${HOMEBREW_TAP_REPO}/contents/Formula/ashex.rb"
          content="$(base64 < .dist/ashex.rb | tr -d '\n')"
          current_sha="$(gh api "$api_path" --jq '.sha' 2>/dev/null || true)"
          if [ -n "$current_sha" ]; then
            gh api "$api_path" \
              --method PUT \
              -f message="Update Ashex formula to ${GITHUB_REF_NAME}" \
              -f content="$content" \
              -f sha="$current_sha"
          else
            gh api "$api_path" \
              --method PUT \
              -f message="Add Ashex formula" \
              -f content="$content"
          fi
