name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run test suite
        run: swift test

  release:
    needs: test
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package source archive
        run: ./scripts/package_source_release.sh "${GITHUB_REF_NAME}"

      - name: Package release archive
        run: ./scripts/package_release.sh "${GITHUB_REF_NAME}"

      - name: Generate Homebrew formula
        run: |
          ./scripts/render_homebrew_formula.sh \
            --version "${GITHUB_REF_NAME}" \
            --source-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/ashex-${GITHUB_REF_NAME}-source.tar.gz" \
            --sha256 "$(cat ".dist/ashex-${GITHUB_REF_NAME}-source.tar.gz.sha256")" \
            --homepage "https://github.com/${GITHUB_REPOSITORY}" \
            --output ".dist/ashex.rb"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .dist/*.tar.gz
            .dist/*.sha256
            .dist/ashex.rb
